name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on changed files
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Label issue based on keywords
        uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue.title || "").toLowerCase();
            const body = (context.payload.issue.body || "").toLowerCase();
            const text = `${title} ${body}`;

            const rules = [
              { label: "bug", keywords: ["bug", "error", "crash", "fehler", "kaputt"] },
              { label: "enhancement", keywords: ["feature", "idee", "vorschlag", "enhancement"] },
              { label: "documentation", keywords: ["docs", "readme", "dokumentation"] },
              { label: "automation", keywords: ["workflow", "action", "ci/cd", "automation", "pipeline"] },
              { label: "ai", keywords: ["ai", "llm", "gpt", "claude", "prompt"] },
              { label: "edi", keywords: ["edi", "edifact", "x12", "as2", "mapping"] },
            ];

            const matched = rules
              .filter(rule => rule.keywords.some(k => text.includes(k)))
              .map(rule => rule.label);

            if (matched.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: matched,
              });
            }
