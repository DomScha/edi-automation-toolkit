name: Repo Linter

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check essential files and report
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const checks = JSON.parse('[{"name":"README","paths":["README.md","readme.md"],"required":true},{"name":"LICENSE","paths":["LICENSE","LICENSE.md","LICENSE.txt"],"required":true},{"name":".gitignore","paths":[".gitignore"],"required":true},{"name":"CONTRIBUTING","paths":["CONTRIBUTING.md",".github/CONTRIBUTING.md"],"required":false},{"name":"CODEOWNERS","paths":[".github/CODEOWNERS","CODEOWNERS"],"required":false},{"name":"Issue Templates","paths":[".github/ISSUE_TEMPLATE"],"required":false}]');

            const results = checks.map(function (check) {
              const found = check.paths.some(function (p) {
                return fs.existsSync(path.join(process.env.GITHUB_WORKSPACE, p));
              });
              return Object.assign({}, check, { found: found });
            });

            const missingRequired = results.filter(function (r) { return r.required && !r.found; });
            const missingOptional = results.filter(function (r) { return !r.required && !r.found; });
            const present = results.filter(function (r) { return r.found; });

            const lines = [];
            lines.push('## Repo Linter Report');
            lines.push('');
            lines.push('### Vorhanden');
            if (present.length > 0) {
              present.forEach(function (r) { lines.push('- ' + r.name); });
            } else {
              lines.push('_Keine der geprueften Dateien gefunden._');
            }
            lines.push('');

            if (missingRequired.length > 0) {
              lines.push('### Fehlt (empfohlen)');
              missingRequired.forEach(function (r) {
                lines.push('- **' + r.name + '** - ' + r.paths[0]);
              });
              lines.push('');
            }

            if (missingOptional.length > 0) {
              lines.push('### Optional, koennte ergaenzt werden');
              missingOptional.forEach(function (r) {
                lines.push('- ' + r.name + ' - ' + r.paths[0]);
              });
              lines.push('');
            }

            const score = Math.round((present.length / results.length) * 100);
            lines.push('### Repo Health Score: ' + score + '%');

            const report = lines.join('\n');

            console.log(report);

            core.setOutput('missing_required', missingRequired.length);
            core.setOutput('score', score);

            await core.summary.addRaw(report).write();

            if (context.eventName === 'pull_request') {
              const commentsResp = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const comments = commentsResp.data;
              let existing = null;
              for (let i = 0; i < comments.length; i++) {
                if (comments[i].body.indexOf('Repo Linter Report') !== -1 && comments[i].user.type === 'Bot') {
                  existing = comments[i];
                  break;
                }
              }

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: report,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: report,
                });
              }
            }

      - name: Fail if required files are missing
        if: steps.check.outputs.missing_required > 0
        run: |
          echo "::warning::Es fehlen empfohlene Dateien im Repo. Siehe Report oben."
